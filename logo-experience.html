<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convectorify | Logo Studio Final</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --ui-panel: #f5f5f5;
            --accent: #000;
            --rounding: 0px;
        }

        [data-theme="dark"] {
            --bg: #0a0c10;
            --text: #ffffff;
            --ui-panel: #161a22;
            --accent: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .showcase {
            width: 450px;
            height: 450px;
            padding: 60px;
            background: var(--ui-panel);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            margin-bottom: 30px;
        }

        /* LOGO ESTILIZADO CON CONTROL DE REDONDEO */
        .logo-svg {
            width: 100%;
            height: 100%;
            color: var(--accent);
            fill: currentColor;
            stroke: currentColor;
            stroke-width: var(--rounding);
            stroke-linejoin: round;
            stroke-linecap: round;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
            background: var(--ui-panel);
            padding: 25px;
            border-radius: 20px;
        }

        .control-item { display: flex; flex-direction: column; gap: 10px; }
        .control-item label { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; opacity: 0.7; }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #00ffcc;
        }

        .theme-toggle {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .info { margin-top: 20px; text-align: center; opacity: 0.5; font-size: 0.8rem; }
    </style>
</head>
<body data-theme="dark">

    <div class="showcase">
        <svg class="logo-svg" viewBox="-500 -500 1000 1000" xmlns="http://www.w3.org/2000/svg">
            <!-- Letra C -->
            <polygon points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" />
            <!-- Letra V Unificada -->
            <polygon points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" />
            <!-- Estructura Y -->
            <g stroke-width="24">
                <line x1="0" y1="0" x2="0" y2="130" />
                <line x1="0" y1="0" x2="-145" y2="-92" />
                <line x1="0" y1="0" x2="145" y2="-92" />
            </g>
        </svg>
    </div>

    <div class="controls">
        <div class="control-item">
            <label>Suavizado de Esquinas (Rounding): <span id="round-val">0</span>px</label>
            <input type="range" id="rounding-slider" min="0" max="20" value="0" oninput="updateRounding(this.value)">
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">Cambiar Color de Fondo</button>
    </div>

    <div class="info">
        <p>Convectorify Studio v3.2 - Edición Micro-Puliendo</p>
    </div>

    <script>
        function updateRounding(val) {
            document.documentElement.style.setProperty('--rounding', val + 'px');
            document.getElementById('round-val').innerText = val;
        }

        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }
    </script>
</body>
</html>
