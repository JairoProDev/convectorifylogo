<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vectorify Blueprint | Mathematical Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #0f1115; 
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Editor de Código Lateral */
        #sidebar {
            width: 400px;
            background: #1a1d24;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }

        .header {
            padding: 20px;
            background: #232730;
            border-bottom: 1px solid #333;
        }
        
        .header h1 { font-size: 1.2rem; color: #00ffcc; margin-bottom: 5px; }
        .header p { font-size: 0.8rem; color: #888; }

        #editor-container {
            flex-grow: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        #code-editor {
            width: 100%;
            flex-grow: 1;
            background: #000;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px;
            resize: none;
            outline: none;
        }

        #update-btn {
            margin-top: 15px;
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }
        #update-btn:hover { background: #00ccaa; }

        /* Lienzo de Blueprint */
        #blueprint-area {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle at center, #1a1d24 0%, #0a0c10 100%);
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .grid-line { stroke: rgba(255, 255, 255, 0.05); stroke-width: 1; }
        .grid-axis { stroke: rgba(0, 255, 204, 0.2); stroke-width: 1; }

        .shape-path {
            fill: rgba(0, 255, 204, 0.05);
            stroke: #00ffcc;
            stroke-width: 2.5;
            transition: all 0.3s;
        }
        .shape-path:hover {
            fill: rgba(0, 255, 204, 0.15);
            stroke-width: 4;
        }

        .vertex {
            fill: #ff0055;
            stroke: #fff;
            stroke-width: 1;
            cursor: crosshair;
            transition: 0.2s;
        }
        .vertex:hover { fill: #fff; stroke: #ff0055; stroke-width: 2; r: 6; }

        .vertex-label {
            font-family: monospace;
            font-size: 10px;
            fill: #aaa;
            pointer-events: none;
        }
        .coord-label {
            font-family: monospace;
            font-size: 9px;
            fill: #666;
            pointer-events: none;
        }

        .angle-arc { fill: rgba(255, 215, 0, 0.2); stroke: #ffd700; stroke-width: 1; }
        .angle-text { font-family: monospace; font-size: 9px; fill: #ffd700; pointer-events: none; }

        /* UI de Coordenadas Flotantes */
        #hud {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #333;
            padding: 15px;
            border-radius: 8px;
            color: #fff;
            font-family: monospace;
            pointer-events: none;
        }
        #hud-title { color: #00ffcc; font-weight: bold; margin-bottom: 5px; }

    </style>
</head>
<body>

    <!-- Editor Lateral -->
    <div id="sidebar">
        <div class="header">
            <h1>Engine Matemático</h1>
            <p>Edita las coordenadas [X, Y] y presiona "Renderizar". El centro es [0,0].</p>
        </div>
        <div id="editor-container">
            <textarea id="code-editor" spellcheck="false"></textarea>
            <button id="update-btn">RENDERIZAR CAMBIOS (Actualizar Gráficos)</button>
        </div>
    </div>

    <!-- Lienzo SVG -->
    <div id="blueprint-area">
        <svg id="blueprint-svg" viewBox="-500 -500 1000 1000">
            <g id="grid-group"></g>
            <g id="angles-group"></g>
            <g id="shapes-group"></g>
            <g id="vertices-group"></g>
        </svg>
        
        <div id="hud">
            <div id="hud-title">Blueprint Mode Activo</div>
            <div id="hud-info">Pasa el mouse sobre un vértice...</div>
        </div>
    </div>

    <script>
        // Configuración Inicial de Geometría
        // Aquí definimos los puntos matemáticos exactos que componen el logo.
        const defaultGeometry = {
            points: {
                // Outer Hexagon 'C'
                C_Top: [0, -380],
                C_TR_Out: [329, -190],
                C_TR_TipCut: [329, -50],
                C_TR_InCut: [230, 7],
                C_TR_In: [230, -133],
                C_Top_In: [0, -266],
                C_TL_In: [-230, -133],
                C_BL_In: [-230, 133],
                C_Bot_In: [0, 266],
                C_BR_In: [230, 133],
                C_BR_InCut: [230, -7],
                C_BR_TipCut: [329, 50],
                C_BR_Out: [329, 190],
                C_Bot: [0, 380],
                C_BL_Out: [-329, 190],
                C_TL_Out: [-329, -190],

                // Diamante Central (Top Cara del cubo interior)
                D_Top: [0, -90],
                D_Right: [100, -32],
                D_Bot: [0, 25],
                D_Left: [-100, -32],

                // V Izquierda (Ala)
                VL_TopOuter: [-200, -110], // La 'barba' que apunta afuera
                VL_TopInner: [-130, -110],
                VL_InnerCubeJunction: [-20, 36], // Conecta al borde del diamante
                VL_CubeStemBottom: [-20, 220],
                VL_BotVertex: [0, 235], // Punta final inferior
                VL_OuterSlant: [-100, 60],

                // V Derecha (Ala)
                VR_TopInner: [130, -110],
                VR_TopOuter: [200, -110],
                VR_OuterSlant: [100, 60],
                VR_BotVertex: [0, 235],
                VR_CubeStemBottom: [20, 220],
                VR_InnerCubeJunction: [20, 36]
            },
            shapes: [
                {
                    name: "Outer_C", 
                    vertices: ["C_Top", "C_TR_Out", "C_TR_TipCut", "C_TR_InCut", "C_TR_In", "C_Top_In", "C_TL_In", "C_BL_In", "C_Bot_In", "C_BR_In", "C_BR_InCut", "C_BR_TipCut", "C_BR_Out", "C_Bot", "C_BL_Out", "C_TL_Out"]
                },
                {
                    name: "Cube_Diamond",
                    vertices: ["D_Top", "D_Right", "D_Bot", "D_Left"]
                },
                {
                    name: "V_Left_Wing",
                    vertices: ["VL_TopOuter", "VL_TopInner", "VL_InnerCubeJunction", "VL_CubeStemBottom", "VL_BotVertex", "VL_OuterSlant"]
                },
                {
                    name: "V_Right_Wing",
                    vertices: ["VR_TopInner", "VR_TopOuter", "VR_OuterSlant", "VR_BotVertex", "VR_CubeStemBottom", "VR_InnerCubeJunction"]
                }
            ]
        };

        // Inyectar config al editor
        const editor = document.getElementById('code-editor');
        editor.value = JSON.stringify(defaultGeometry, null, 4);

        const svg = document.getElementById('blueprint-svg');
        const gridGroup = document.getElementById('grid-group');
        const shapesGroup = document.getElementById('shapes-group');
        const verticesGroup = document.getElementById('vertices-group');
        const anglesGroup = document.getElementById('angles-group');
        const hudInfo = document.getElementById('hud-info');

        // Dibujar cuadricula milimétrica
        function drawGrid() {
            gridGroup.innerHTML = '';
            // Axes
            gridGroup.innerHTML += `<line x1="-500" y1="0" x2="500" y2="0" class="grid-axis"/>`;
            gridGroup.innerHTML += `<line x1="0" y1="-500" x2="0" y2="500" class="grid-axis"/>`;
            // Grid lines
            for(let i = -500; i <= 500; i += 50) {
                if(i === 0) continue;
                gridGroup.innerHTML += `<line x1="-500" y1="${i}" x2="500" y2="${i}" class="grid-line"/>`;
                gridGroup.innerHTML += `<line x1="${i}" y1="-500" x2="${i}" y2="500" class="grid-line"/>`;
            }
        }

        // Utilidad matematica angulos
        function getAngleBetweenThreePoints(p1, p2, p3) {
            // angle at p2
            const a = Math.hypot(p3[0] - p2[0], p3[1] - p2[1]);
            const b = Math.hypot(p1[0] - p2[0], p1[1] - p2[1]);
            const c = Math.hypot(p3[0] - p1[0], p3[1] - p1[1]);
            let angleRad = Math.acos((a*a + b*b - c*c) / (2 * a * b));
            if (isNaN(angleRad)) angleRad = 0;
            return (angleRad * 180 / Math.PI).toFixed(1);
        }

        function renderEngine(geometry) {
            shapesGroup.innerHTML = '';
            verticesGroup.innerHTML = '';
            anglesGroup.innerHTML = '';
            
            const points = geometry.points;

            // Renderizar Formas
            geometry.shapes.forEach(shape => {
                const pathCoords = shape.vertices.map(vName => points[vName].join(',')).join(' ');
                shapesGroup.innerHTML += `<polygon points="${pathCoords}" class="shape-path" data-name="${shape.name}"/>`;
                
                // Renderizar Angulos de esta forma (opcional, para visualización técnica)
                for(let i = 0; i < shape.vertices.length; i++) {
                    const prev = shape.vertices[(i === 0) ? shape.vertices.length - 1 : i - 1];
                    const curr = shape.vertices[i];
                    const next = shape.vertices[(i + 1) % shape.vertices.length];
                    
                    const angle = getAngleBetweenThreePoints(points[prev], points[curr], points[next]);
                    
                    // Solo como información visual ligera
                    anglesGroup.innerHTML += `
                        <text x="${points[curr][0]}" y="${points[curr][1] + 15}" class="angle-text" text-anchor="middle">${angle}°</text>
                    `;
                }
            });

            // Renderizar Vértices interactivos
            Object.keys(points).forEach(pName => {
                const [x, y] = points[pName];
                
                // Círculo interactivo
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', x);
                circle.setAttribute('cy', y);
                circle.setAttribute('r', 4);
                circle.setAttribute('class', 'vertex');
                
                circle.addEventListener('mouseover', () => {
                    hudInfo.innerHTML = `Vértice: <span style="color:#00ffcc">${pName}</span><br>X: ${x}<br>Y: ${y}`;
                });
                circle.addEventListener('mouseleave', () => {
                    hudInfo.innerHTML = `Pasa el mouse sobre un vértice...`;
                });

                // Etiquetas visuales directas
                const textName = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                textName.setAttribute('x', x + 8);
                textName.setAttribute('y', y - 4);
                textName.setAttribute('class', 'vertex-label');
                textName.textContent = pName;

                const textCoord = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                textCoord.setAttribute('x', x + 8);
                textCoord.setAttribute('y', y + 6);
                textCoord.setAttribute('class', 'coord-label');
                textCoord.textContent = `[${x}, ${y}]`;

                verticesGroup.appendChild(circle);
                verticesGroup.appendChild(textName);
                verticesGroup.appendChild(textCoord);
            });
        }

        // Evento Actualizar
        document.getElementById('update-btn').addEventListener('click', () => {
            try {
                const parsedGeometry = JSON.parse(editor.value);
                renderEngine(parsedGeometry);
            } catch (e) {
                alert('Error en el JSON. Por favor revisa la sintaxis: ' + e.message);
            }
        });

        // Inicializar
        drawGrid();
        renderEngine(defaultGeometry);
    </script>
</body>
</html>
