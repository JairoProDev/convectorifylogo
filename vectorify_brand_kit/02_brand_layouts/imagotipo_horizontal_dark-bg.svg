<svg viewBox="-500 -400 3000 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&amp;display=swap');
    .brand-text { font-family: 'Outfit', sans-serif; font-size: 550px; font-weight: 700; fill: #ffffff; letter-spacing: -10px; }
    .mark { color: #00FFCC; fill: currentColor; stroke: currentColor; }
  </style>

  <g transform="translate(0, 0)">
    <!-- THE ICON (Tightly placed) -->
    <g class="mark" stroke-linejoin="round" stroke-linecap="round">
        <polygon points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" stroke-width="8"/>
        <polygon points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" stroke-width="8"/>
        <g stroke-width="24" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g>
    </g>

    <!-- THE TEXT -->
    <text x="500" y="200" class="brand-text">CONVECTORIFY</text>
  </g>
</svg>
