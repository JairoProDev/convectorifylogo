<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vectorify Blueprint 3.1 | V Original Refinada</title>
    <style>
        :root {
            --bg: #05070a;
            --panel: #11141b;
            --accent: #00ffcc;
            --phi: #ffd700;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 380px;
            background: var(--panel);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .header {
            padding: 25px;
            background: #1a1e26;
            border-bottom: 4px solid var(--accent);
        }
        .header h1 { font-size: 1.1rem; color: var(--accent); letter-spacing: 2px; }

        .analysis {
            padding: 20px;
            font-size: 0.8rem;
            line-height: 1.6;
            border-bottom: 1px solid #333;
        }
        .analysis b { color: var(--accent); }

        #export-area {
            background: #000;
            color: var(--accent);
            font-family: 'Fira Code', monospace;
            font-size: 9px;
            width: 100%;
            height: 250px;
            padding: 15px;
            border: none;
            resize: none;
            outline: none;
        }

        #blueprint-area { flex-grow: 1; position: relative; }
        svg { width: 100%; height: 100%; }

        .logo-fill { fill: #fff; stroke: none; }
        .line-y { stroke: #fff; stroke-width: 20; stroke-linecap: round; } 

        .vertex { fill: var(--accent); cursor: grab; }
        .label { font-size: 10px; fill: #666; font-family: monospace; pointer-events: none; }

        .hud-top {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--accent);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h1>Engine 3.1: V-Core Fix</h1>
        </div>

        <div class="analysis">
            <h3>Estado del Refinamiento:</h3>
            <ul>
                <li><b>V-Structure:</b> Restaurada a 5 puntos por ala (Conexión central).</li>
                <li><b>Grosor Y:</b> Mantenido en <b>20px</b> para estabilidad estética.</li>
                <li><b>Flechas:</b> Ángulos mantenidos para impacto visual.</li>
            </ul>
        </div>

        <div style="padding: 20px;">
            <p style="font-size: 0.7rem; color: #555; margin-bottom: 10px;">CÓDIGO SVG EXPORTABLE:</p>
            <textarea id="export-area" readonly></textarea>
        </div>
    </div>

    <div id="blueprint-area">
        <div class="hud-top">Visualización: <b>V-Original + Y-Engrosada</b></div>
        <svg id="blueprint-svg" viewBox="-500 -500 1000 1000">
            <g id="shapes-group"></g>
            <g id="y-group"></g>
            <g id="vertices-group"></g>
        </svg>
    </div>

    <script>
        let geom = {
            "points": {
                "C_Top": [0, -390], "C_TR_Out": [338, -195], "C_TR_InCut": [225, -130],
                "C_Top_In": [0, -260], "C_TL_In": [-225, -130], "C_TL_Out": [-338, -195],
                "C_BL_Out": [-338, 195], "C_BL_In": [-225, 130], "C_Bot_In": [0, 260],
                "C_BR_InCut": [225, 130], "C_BR_Out": [338, 195], "C_Bot": [0, 390],
                "Y_Center": [0, 0], "VL_TopInner": [-125, -75], "VR_TopInner": [125, -75],
                "VR_InnerCubeJunction": [0, 130], "VL_TopOuter": [-70, -130],
                "VL_BotVertex": [0, 260], "VL_OuterSlant": [-225, -130],
                "VR_TopOuter": [70, -130], "VR_BotVertex": [0, 260], "VR_OuterSlant": [225, -130]
            },
            "shapes": [
                { "name": "Outer_C", "vertices": ["C_Top", "C_TR_Out", "C_TR_InCut", "C_Top_In", "C_TL_In", "C_BL_In", "C_Bot_In", "C_BR_InCut", "C_BR_Out", "C_Bot", "C_BL_Out", "C_TL_Out"] },
                { "name": "V_Left", "vertices": ["VL_TopOuter", "VL_TopInner", "VR_InnerCubeJunction", "VL_BotVertex", "VL_OuterSlant"] },
                { "name": "V_Right", "vertices": ["VR_TopOuter", "VR_TopInner", "VR_InnerCubeJunction", "VR_BotVertex", "VR_OuterSlant"] }
            ],
            "yLines": [["Y_Center", "VR_InnerCubeJunction"], ["Y_Center", "VL_TopInner"], ["Y_Center", "VR_TopInner"]]
        };

        const svg = document.getElementById('blueprint-svg');
        const exportArea = document.getElementById('export-area');

        function render() {
            const sg = document.getElementById('shapes-group');
            const yg = document.getElementById('y-group');
            const vg = document.getElementById('vertices-group');
            sg.innerHTML = ''; yg.innerHTML = ''; vg.innerHTML = '';
            const pts = geom.points;

            geom.shapes.forEach(s => {
                const path = s.vertices.map(v => pts[v].join(',')).join(' ');
                sg.innerHTML += `<polygon points="${path}" class="logo-fill" />`;
            });

            geom.yLines.forEach(line => {
                const p1 = pts[line[0]];
                const p2 = pts[line[1]];
                yg.innerHTML += `<line x1="${p1[0]}" y1="${p1[1]}" x2="${p2[0]}" y2="${p2[1]}" class="line-y" />`;
            });

            Object.keys(pts).forEach(pName => {
                const [x,y] = pts[pName];
                vg.innerHTML += `<circle cx="${x}" cy="${y}" r="3" class="vertex" />`;
                vg.innerHTML += `<text x="${x+5}" y="${y-5}" class="label">${pName}</text>`;
            });

            generateMinimalSVG();
        }

        function generateMinimalSVG() {
            let code = `<svg viewBox="-500 -500 1000 1000" xmlns="http://www.w3.org/2000/svg" fill="#000000">\n`;
            geom.shapes.forEach(s => {
                const path = s.vertices.map(v => geom.points[v].join(',')).join(' ');
                code += `  <polygon points="${path}" />\n`;
            });
            geom.yLines.forEach(l => {
                const p1 = geom.points[l[0]], p2 = geom.points[l[1]];
                code += `  <line x1="${p1[0]}" y1="${p1[1]}" x2="${p2[0]}" y2="${p2[1]}" stroke="#000000" stroke-width="20" stroke-linecap="round" />\n`;
            });
            code += `</svg>`;
            exportArea.value = code;
        }

        render();
    </script>
</body>
</html>
