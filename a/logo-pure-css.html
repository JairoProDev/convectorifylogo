<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vectorify | Pure CSS Architecture</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --logo-color: #0a0a0a;
        }

        body.dark-mode {
            --bg-color: #0a0a0a;
            --logo-color: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            transition: background 0.4s ease;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* 
         * ========================================================
         * 100% PURE GEOMETRY CSS ENGINE 
         * NO SVG. NO CANVAS. NO IMAGES.
         * ========================================================
         * Todo el logo es dibujado estructurando elementos del DOM 
         * recortados mediante matemática de polígonos CSS.
         */

        .vectorify-logo {
            position: relative;
            /* Proporción exacta de un Hexágono Isométrico (1 : √3/2 * 2) */
            width: min(70vw, 70vh, 450px);
            aspect-ratio: 1 / 1.1547; 
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.15));
        }

        .shape-layer {
            position: absolute;
            inset: 0;
            background: var(--logo-color);
            transition: background 0.4s ease;
        }

        /* 1. EL BRAZO IZQUIERDO DEL HEXÁGONO 'C' */
        .c-left-arc {
            clip-path: polygon(
                50% 0%, 
                6.7% 25%, 
                6.7% 75%, 
                50% 100%, 
                50% 85%, 
                19.7% 67.5%, 
                19.7% 32.5%, 
                50% 15%
            );
        }

        /* 2. EL BRAZO SUPERIOR DERECHO (CORTE ISOMÉTRICO) */
        .c-top-right {
            clip-path: polygon(
                50% 0%, 
                93.3% 25%, 
                93.3% 40%, 
                80.3% 47.5%, 
                80.3% 32.5%, 
                50% 15%
            );
        }

        /* 3. EL BRAZO INFERIOR DERECHO */
        .c-bottom-right {
            clip-path: polygon(
                50% 100%, 
                93.3% 75%, 
                93.3% 60%, 
                80.3% 52.5%, 
                80.3% 67.5%, 
                50% 85%
            );
        }

        /* 4. ALA IZQUIERDA DE LA 'V' */
        .v-left-wing {
            clip-path: polygon(
                19.7% 32.5%, 
                35% 32.5%, 
                46% 50%, 
                46% 78%
            );
        }

        /* 5. ALA DERECHA DE LA 'V' */
        .v-right-wing {
            clip-path: polygon(
                80.3% 32.5%, 
                65% 32.5%, 
                54% 50%, 
                54% 78%
            );
        }

        /* 6. EL DIAMANTE O CUBO CENTRAL FLOTANTE */
        .center-diamond {
            clip-path: polygon(
                50% 28%, 
                57% 41%, 
                50% 48%, 
                43% 41%
            );
        }

        /* Utilidades de Presentación */
        .controls {
            position: absolute;
            top: 2rem;
            display: flex;
            gap: 1rem;
        }

        button {
            background: transparent;
            color: var(--logo-color);
            border: 2px solid var(--logo-color);
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        button:hover {
            opacity: 0.6;
        }

        .label {
            position: absolute;
            bottom: 2rem;
            text-align: center;
            color: var(--logo-color);
        }

        .label h1 { font-weight: 900; letter-spacing: 0.25em; font-size: 1.5rem; text-transform: uppercase; }
        .label p { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.6; margin-top: 5px; }

    </style>
</head>
<body>
    
    <div class="controls">
        <button onclick="document.body.classList.toggle('dark-mode')">Intercambiar Color</button>
    </div>

    <!-- EL LOGO MAESTRO EN DOM/CSS -->
    <div class="vectorify-logo">
        <div class="shape-layer c-left-arc"></div>
        <div class="shape-layer c-top-right"></div>
        <div class="shape-layer c-bottom-right"></div>
        
        <div class="shape-layer v-left-wing"></div>
        <div class="shape-layer v-right-wing"></div>
        
        <div class="shape-layer center-diamond"></div>
    </div>

    <div class="label">
        <h1>Vectorify</h1>
        <p>100% Código Front-End . Sin SVG . Sin JS</p>
    </div>

</body>
</html>
