<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vectorify Blueprint 2.1 | Editor Proporcional</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #0f1115; 
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #sidebar {
            width: 400px;
            background: #1a1d24;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
            z-index: 10;
        }

        .header {
            padding: 20px;
            background: #232730;
            border-bottom: 2px solid #00ffcc;
        }
        
        .header h1 { font-size: 1.2rem; color: #00ffcc; margin-bottom: 5px; }
        .header p { font-size: 0.8rem; color: #aaa; line-height: 1.4; }

        .controls-info {
            padding: 15px;
            font-size: 0.75rem;
            background: #111;
            border-bottom: 1px solid #333;
        }
        .controls-info b { color: #ffd700; }

        #editor-container {
            flex-grow: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        #code-editor {
            width: 100%;
            flex-grow: 1;
            background: #000;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px;
            resize: none;
            outline: none;
        }

        #blueprint-area {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle at center, #1a1d24 0%, #0a0c10 100%);
        }

        svg { width: 100%; height: 100%; cursor: crosshair; }

        .grid-line { stroke: rgba(255, 255, 255, 0.05); stroke-width: 1; pointer-events: none;}
        .grid-axis { stroke: rgba(0, 255, 204, 0.2); stroke-width: 1.5; pointer-events: none;}

        .shape-path {
            fill: rgba(0, 255, 204, 0.05);
            stroke: #00ffcc;
            stroke-width: 3;
            pointer-events: visibleStroke;
            transition: stroke 0.2s;
        }
        .shape-path:hover { stroke: #fff; cursor: copy; }

        .line-y {
            stroke: #ffd700;
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        .vertex {
            fill: #ff0055;
            stroke: #fff;
            stroke-width: 2;
            cursor: grab;
        }
        .vertex:hover { fill: #fff; stroke: #ff0055; stroke-width: 3; r: 8; }
        .vertex.dragging { fill: #00ffcc; stroke: #fff; r: 10; cursor: grabbing; }
        .vertex.fused { stroke: #ffd700; stroke-width: 3; }

        .vertex-label {
            font-family: monospace;
            font-size: 11px;
            fill: #fff;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
        }

        #hud {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #00ffcc;
            padding: 15px;
            border-radius: 8px;
            color: #fff;
            font-family: monospace;
            pointer-events: none;
            min-width: 200px;
        }
        #hud-title { color: #ffd700; font-weight: bold; margin-bottom: 5px; }

    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h1>Dynamic Engine 2.2</h1>
            <p>Proporciones uniformes y lógica de fusión lineal.</p>
        </div>
        <div class="controls-info">
            <b>Shift + Click</b>: Crear punto en línea.<br>
            <b>Drag sobre punto</b>: Fusionar (snap).<br>
            <b>Ctrl + Click</b>: Desvincular punto.
        </div>
        <div id="editor-container">
            <textarea id="code-editor" spellcheck="false" readonly></textarea>
        </div>
    </div>

    <div id="blueprint-area">
        <svg id="blueprint-svg" viewBox="-500 -500 1000 1000">
            <g id="grid-group"></g>
            <g id="shapes-group"></g>
            <g id="y-group"></g>
            <g id="vertices-group"></g>
        </svg>
        
        <div id="hud">
            <div id="hud-title">Engine Status</div>
            <div id="hud-info">Listo...</div>
        </div>
    </div>

    <script>
        // Configuración de proporciones (Matemáticas para grosor uniforme)
        // Ratio sqrt(3) approx 1.732 para ángulos de 30/60
        let currentGeometry = {
            "points": {
                "C_Top": [0, -390],
                "C_TR_Out": [338, -195],
                "C_TR_InCut": [225, -130],
                "C_Top_In": [0, -260],
                "C_TL_In": [-225, -130],
                "C_BL_In": [-225, 130],
                "C_Bot_In": [0, 260],
                "C_BR_InCut": [225, 130],
                "C_BR_Out": [338, 195],
                "C_Bot": [0, 390],
                "C_BL_Out": [-338, 195],
                "C_TL_Out": [-338, -195],
                
                "Y_Center": [0, 0],
                "VL_TopInner": [-125, -75],
                "VR_TopInner": [125, -75],
                "VR_InnerCubeJunction": [0, 130],
                
                "VL_TopOuter": [-115, -130],
                "VL_BotVertex": [0, 260],
                "VL_OuterSlant": [-225, -130],
                
                "VR_TopOuter": [115, -130],
                "VR_BotVertex": [0, 260],
                "VR_OuterSlant": [225, -130]
            },
            "shapes": [
                { "name": "Outer_C", "vertices": ["C_Top", "C_TR_Out", "C_TR_InCut", "C_Top_In", "C_TL_In", "C_BL_In", "C_Bot_In", "C_BR_InCut", "C_BR_Out", "C_Bot", "C_BL_Out", "C_TL_Out"] },
                { "name": "V_Left", "vertices": ["VL_TopOuter", "VL_TopInner", "VR_InnerCubeJunction", "VL_BotVertex", "VL_OuterSlant"] },
                { "name": "V_Right", "vertices": ["VR_TopOuter", "VR_TopInner", "VR_InnerCubeJunction", "VR_BotVertex", "VR_OuterSlant"] }
            ],
            "yLines": [
                ["Y_Center", "VR_InnerCubeJunction"],
                ["Y_Center", "VL_TopInner"],
                ["Y_Center", "VR_TopInner"]
            ]
        };

        const svg = document.getElementById('blueprint-svg');
        const hudInfo = document.getElementById('hud-info');
        const editor = document.getElementById('code-editor');

        let draggingPoint = null;
        let fusedGroups = []; // Mantendrá arrays de nombres de puntos vinculados

        function drawGrid() {
            const group = document.getElementById('grid-group');
            group.innerHTML = `<line x1="-500" y1="0" x2="500" y2="0" class="grid-axis"/><line x1="0" y1="-500" x2="0" y2="500" class="grid-axis"/>`;
            for(let i = -500; i <= 500; i += 50) {
                if(i===0) continue;
                group.innerHTML += `<line x1="-500" y1="${i}" x2="500" y2="${i}" class="grid-line"/>`;
                group.innerHTML += `<line x1="${i}" y1="-500" x2="${i}" y2="500" class="grid-line"/>`;
            }
        }

        function render() {
            const shapesGroup = document.getElementById('shapes-group');
            const verticesGroup = document.getElementById('vertices-group');
            const yGroup = document.getElementById('y-group');
            
            shapesGroup.innerHTML = ''; verticesGroup.innerHTML = ''; yGroup.innerHTML = '';

            const pts = currentGeometry.points;

            // Dibujar formas
            currentGeometry.shapes.forEach((s, idx) => {
                const path = s.vertices.map(v => pts[v].join(',')).join(' ');
                shapesGroup.innerHTML += `<polygon points="${path}" class="shape-path" data-shape-index="${idx}"/>`;
            });

            // Dibujar la Y
            currentGeometry.yLines.forEach(line => {
                const p1 = pts[line[0]];
                const p2 = pts[line[1]];
                yGroup.innerHTML += `<line x1="${p1[0]}" y1="${p1[1]}" x2="${p2[0]}" y2="${p2[1]}" class="line-y" />`;
            });

            // Dibujar puntos
            Object.keys(pts).forEach(pName => {
                const [x, y] = pts[pName];
                const isFused = isPointFused(pName);
                
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', x);
                circle.setAttribute('cy', y);
                circle.setAttribute('r', draggingPoint === pName ? 10 : 5);
                circle.setAttribute('class', `vertex ${draggingPoint === pName ? 'dragging' : ''} ${isFused ? 'fused' : ''}`);
                circle.setAttribute('data-name', pName);
                verticesGroup.appendChild(circle);
                
                verticesGroup.innerHTML += `<text x="${x+8}" y="${y-8}" class="vertex-label">${pName}</text>`;
            });

            editor.value = JSON.stringify(currentGeometry, null, 4);
        }

        function isPointFused(name) {
            return fusedGroups.some(group => group.includes(name));
        }

        function getMousePos(evt) {
            const CTM = svg.getScreenCTM();
            return { x: (evt.clientX - CTM.e) / CTM.a, y: (evt.clientY - CTM.f) / CTM.d };
        }

        // --- ACCIONES DEL EDITOR ---

        svg.addEventListener('mousedown', (e) => {
            const pos = getMousePos(e);
            
            // 1. Seleccionar punto para arrastrar
            if (e.target.classList.contains('vertex')) {
                const name = e.target.getAttribute('data-name');
                
                if (e.ctrlKey) {
                    // Acción: Separar punto de su grupo
                    fusedGroups = fusedGroups.map(group => group.filter(n => n !== name)).filter(g => g.length > 1);
                    hudInfo.innerHTML = `Punto <span style="color:#ff0055">${name}</span> separado del grupo.`;
                } else {
                    draggingPoint = name;
                    hudInfo.innerHTML = `Arrastrando: <span style="color:#00ffcc">${name}</span>`;
                }
                render();
                return;
            }

            // 2. Crear nuevo punto (Shift + Click en línea)
            if (e.shiftKey && e.target.classList.contains('shape-path')) {
                const shapeIdx = e.target.getAttribute('data-shape-index');
                const newName = "P_" + Math.random().toString(36).substr(2, 5).toUpperCase();
                const newX = Math.round(pos.x);
                const newY = Math.round(pos.y);
                
                currentGeometry.points[newName] = [newX, newY];
                // Insertar en la forma en una posición aproximada (simplificado: al final)
                currentGeometry.shapes[shapeIdx].vertices.push(newName);
                hudInfo.innerHTML = `Nuevo punto creado: ${newName}`;
                render();
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (draggingPoint) {
                const pos = getMousePos(e);
                const newX = Math.round(pos.x);
                const newY = Math.round(pos.y);

                // Encontrar a qué grupo pertenece el punto que arrastramos
                const myGroup = fusedGroups.find(g => g.includes(draggingPoint)) || [draggingPoint];

                // Mover todos los puntos del grupo
                myGroup.forEach(pName => {
                    currentGeometry.points[pName] = [newX, newY];
                });

                render();
            }
        });

        window.addEventListener('mouseup', () => {
            if (draggingPoint) {
                // Lógica de Fusión (Snapping)
                const [x, y] = currentGeometry.points[draggingPoint];
                let targetPoint = null;
                
                Object.keys(currentGeometry.points).forEach(pName => {
                    if (pName !== draggingPoint && !fusedGroups.find(g => g.includes(draggingPoint) && g.includes(pName))) {
                        const [tx, ty] = currentGeometry.points[pName];
                        if (Math.hypot(x - tx, y - ty) < 15) {
                            targetPoint = pName;
                        }
                    }
                });

                if (targetPoint) {
                    // Unir draggingPoint con targetPoint
                    const pos = currentGeometry.points[targetPoint];
                    currentGeometry.points[draggingPoint] = [...pos];
                    
                    // Actualizar grupos de fusión
                    let group1Idx = fusedGroups.findIndex(g => g.includes(draggingPoint));
                    let group2Idx = fusedGroups.findIndex(g => g.includes(targetPoint));
                    
                    if (group1Idx === -1 && group2Idx === -1) {
                        fusedGroups.push([draggingPoint, targetPoint]);
                    } else if (group1Idx !== -1 && group2Idx === -1) {
                        fusedGroups[group1Idx].push(targetPoint);
                    } else if (group1Idx === -1 && group2Idx !== -1) {
                        fusedGroups[group2Idx].push(draggingPoint);
                    } else if (group1Idx !== group2Idx) {
                        // Unir los dos grupos si ambos existen
                        fusedGroups[group1Idx] = [...fusedGroups[group1Idx], ...fusedGroups[group2Idx]];
                        fusedGroups.splice(group2Idx, 1);
                    }
                    hudInfo.innerHTML = `Puntos <span style="color:#ffd700">fusionados</span> correctamente.`;
                }

                draggingPoint = null;
                render();
            }
        });

        drawGrid();
        render();
    </script>
</body>
</html>
