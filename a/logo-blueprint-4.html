<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vectorify | Advanced CAD Studio V4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #0f1115; color: #fff;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            user-select: none;
        }

        /* --- TOOLBAR SUPERIOR --- */
        #toolbar {
            height: 60px; background: #1a1d24; border-bottom: 1px solid #333;
            display: flex; align-items: center; padding: 0 20px; gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 100;
        }
        .btn {
            background: #2a2e38; color: #fff; border: 1px solid #444; border-radius: 4px;
            padding: 8px 12px; font-size: 11px; cursor: pointer; text-transform: uppercase;
            font-weight: bold; transition: 0.2s;
        }
        .btn:hover { background: #00ffcc; color: #000; }
        .btn.active { background: #ff0055; color: #fff; border-color: #ff0055; }
        
        .toolbar-group {
            display: flex; align-items: center; gap: 10px; border-left: 1px solid #333; padding-left: 15px;
        }
        
        select { background: #000; color: #00ffcc; border: 1px solid #444; padding: 6px; border-radius: 4px; font-weight:bold;}
        
        /* --- MAIN LAYOUT --- */
        #workspace { display: flex; flex-grow: 1; height: calc(100vh - 60px); }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 350px; background: #1a1d24; border-right: 1px solid #333; display: flex; flex-direction: column;
        }
        #code-editor {
            flex-grow: 1; width: 100%; background: #000; color: #00ffcc; font-family: monospace; font-size: 11px;
            padding: 15px; border: none; resize: none; outline: none; white-space: pre;
        }

        /* --- CANVAS --- */
        #blueprint-area {
            flex-grow: 1; position: relative; background: #0a0c10; cursor: default; overflow: hidden;
        }
        #blueprint-area.panning { cursor: grabbing; }

        svg { width: 100%; height: 100%; }

        .grid-line { stroke: rgba(255, 255, 255, 0.05); stroke-width: 1; pointer-events: none; }
        .grid-axis { stroke: rgba(0, 255, 204, 0.3); stroke-width: 1; pointer-events: none; }

        .shape-path {
            fill: rgba(0, 255, 204, 0.1); stroke: #00ffcc; stroke-width: 2.5; transition: fill 0.3s, stroke-width 0.3s;
            pointer-events: none;
            mix-blend-mode: screen;
        }
        .wireframe-mode .shape-path { fill: rgba(0,0,0,0) !important; stroke-width: 1.5; }

        .vertex { fill: #ff0055; stroke: #fff; stroke-width: 2; cursor: pointer; transition: 0.1s; }
        .vertex:hover { fill: #fff; stroke: #ff0055; stroke-width: 3; r: 8; }
        .vertex.dragging { fill: #00ffcc; stroke: #fff; r: 10; }

        .vertex-label { font-family: monospace; font-size: 12px; fill: #fff; font-weight: bold; pointer-events: none; text-shadow: 1px 1px 2px #000; }
        .coord-label { font-family: monospace; font-size: 10px; fill: #00ffcc; pointer-events: none; }
        .angle-text { font-family: monospace; font-size: 10px; fill: #ffd700; font-weight:bold; pointer-events: none; }

        #hud {
            position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8);
            border: 1px solid #333; padding: 15px; border-radius: 8px; color: #fff; font-family: monospace; pointer-events: none;
        }
        #hud h3 { color: #ff0055; font-size: 13px; margin-bottom: 5px; }

        .tips { font-size: 10px; color:#888; margin-top:5px; }
    </style>
</head>
<body>

    <!-- TOOLBAR AVANZADA V4 -->
    <div id="toolbar">
        <div>
            <button class="btn" id="btn-export-svg" title="Descargar plano visual como gráfico">⬇ EXPORT SVG</button>
            <button class="btn" id="btn-export-json" title="Descargar código fuente matemático">💾 EXPORT JSON</button>
        </div>
        
        <div class="toolbar-group">
            <button class="btn" onclick="undo()" title="Deshacer (CTRL+Z)">↩ Undo</button>
            <button class="btn" onclick="redo()" title="Rehacer (CTRL+Y)">↪ Redo</button>
        </div>

        <div class="toolbar-group">
            <button class="btn active" id="btn-toggle-labels" title="Capa de Textos e Info Matemática">📝 Info Textos</button>
            <button class="btn" id="btn-snap-grid" title="Forzar nodos a rejilla estricta de 10px">🧲 Magnet Snap</button>
            <button class="btn" id="btn-wireframe" title="Ocultar relleno (Modo Rayos X)">🩻 Wireframe</button>
        </div>

        <div class="toolbar-group">
            <input type="file" id="upload-ref" accept="image/*" style="display:none">
            <button class="btn" onclick="document.getElementById('upload-ref').click()" title="Usa tu propio logo de fondo para calcarlo">🖼️ Subir Fondo (Calco)</button>
            <span style="font-size: 11px; font-weight:bold; color: #aaa;">Opacidad Fondo:</span>
            <input type="range" id="ref-opacity" min="0" max="1" step="0.1" value="0.2" style="width:70px;">
        </div>
    </div>

    <div id="workspace">
        <div id="sidebar">
            <div style="padding: 10px; background: #232730; font-size: 11px; line-height: 1.4; color:#aaa; border-bottom:1px solid #333;">
                <b>JSON CAD Engine:</b> Se actualiza en tiempo real.<br>
                💡 <b>NUEVO EN V4:</b> Dale <b>Doble Click</b> al vacío para añadir punto. <b>Doble Click</b> en punto para borrarlo.
            </div>
            <textarea id="code-editor" spellcheck="false"></textarea>
        </div>

        <div id="blueprint-area" class="">
            <svg id="blueprint-svg" viewBox="-500 -500 1000 1000">
                <!-- Capa Calco -->
                <image id="ref-image" href="vectorify logo.svg" x="-400" y="-400" width="800" height="800" opacity="0.2" preserveAspectRatio="xMidYMid meet" pointer-events="none"></image>
                
                <!-- Engine -->
                <g id="grid-group"></g>
                <g id="shapes-group"></g>
                <g id="angles-group"></g>
                <g id="vertices-group"></g>
            </svg>
            
            <div id="hud">
                <h3>V-CAD Studio V4</h3>
                <div id="hud-info">Rueda: Zoom | SHIFT+Click: Arrastrar Mapa</div>
                <div class="tips">Ctrl+Z y Ctrl+Y soportados</div>
            </div>
        </div>
    </div>

    <script>
        // --- ESTADO GLOBAL ---
        let currentGeometry = {
            points: {
                C_Top: [0, -380], C_TR_Out: [329, -190], C_TR_TipCut: [329, -50], C_TR_InCut: [230, 7],
                C_TR_In: [230, -133], C_Top_In: [0, -266], C_TL_In: [-230, -133], C_BL_In: [-230, 133],
                C_Bot_In: [0, 266], C_BR_In: [230, 133], C_BR_InCut: [230, -7], C_BR_TipCut: [329, 50],
                C_BR_Out: [329, 190], C_Bot: [0, 380], C_BL_Out: [-329, 190], C_TL_Out: [-329, -190],
                D_Top: [0, -90], D_Right: [100, -32], D_Bot: [0, 25], D_Left: [-100, -32],
                VL_TopOuter: [-200, -110], VL_TopInner: [-130, -110], VL_InnerCubeJunction: [-20, 36],
                VL_CubeStemBottom: [-20, 220], VL_BotVertex: [0, 235], VL_OuterSlant: [-100, 60],
                VR_TopInner: [130, -110], VR_TopOuter: [200, -110], VR_OuterSlant: [100, 60],
                VR_BotVertex: [0, 235], VR_CubeStemBottom: [20, 220], VR_InnerCubeJunction: [20, 36]
            },
            shapes: [
                { name: "Outer_C", vertices: ["C_Top", "C_TR_Out", "C_TR_TipCut", "C_TR_InCut", "C_TR_In", "C_Top_In", "C_TL_In", "C_BL_In", "C_Bot_In", "C_BR_In", "C_BR_InCut", "C_BR_TipCut", "C_BR_Out", "C_Bot", "C_BL_Out", "C_TL_Out"] },
                { name: "Cube_Diamond", vertices: ["D_Top", "D_Right", "D_Bot", "D_Left"] },
                { name: "V_Left_Wing", vertices: ["VL_TopOuter", "VL_TopInner", "VL_InnerCubeJunction", "VL_CubeStemBottom", "VL_BotVertex", "VL_OuterSlant"] },
                { name: "V_Right_Wing", vertices: ["VR_TopInner", "VR_TopOuter", "VR_OuterSlant", "VR_BotVertex", "VR_CubeStemBottom", "VR_InnerCubeJunction"] }
            ]
        };

        const svg = document.getElementById('blueprint-svg');
        const editor = document.getElementById('code-editor');
        const hudInfo = document.getElementById('hud-info');
        
        let settings = { showLabels: true, snapToGrid: false, wireframe: false, gridSize: 10 };
        let svgViewBox = { x: -500, y: -500, w: 1000, h: 1000 };
        
        // --- HISTORY (UNDO/REDO) ---
        let history = [JSON.stringify(currentGeometry)];
        let historyIndex = 0;

        function pushHistory() {
            const state = JSON.stringify(currentGeometry);
            if (state === history[historyIndex]) return;
            history = history.slice(0, historyIndex + 1);
            history.push(state);
            historyIndex++;
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                currentGeometry = JSON.parse(history[historyIndex]);
                hudInfo.innerHTML = "Undo ejecutado.";
                renderEngine();
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                currentGeometry = JSON.parse(history[historyIndex]);
                hudInfo.innerHTML = "Redo ejecutado.";
                renderEngine();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
            if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
        });

        // --- SISTEMA DE DIBUJO ---
        function drawGrid() {
            const gridGroup = document.getElementById('grid-group');
            gridGroup.innerHTML = '';
            // Axes
            gridGroup.innerHTML += `<line x1="-2000" y1="0" x2="2000" y2="0" class="grid-axis"/>`;
            gridGroup.innerHTML += `<line x1="0" y1="-2000" x2="0" y2="2000" class="grid-axis"/>`;
            // Grid
            for(let i = -2000; i <= 2000; i += 50) {
                if(i === 0) continue;
                gridGroup.innerHTML += `<line x1="-2000" y1="${i}" x2="2000" y2="${i}" class="grid-line"/>`;
                gridGroup.innerHTML += `<line x1="${i}" y1="-2000" x2="${i}" y2="2000" class="grid-line"/>`;
            }
        }

        function getAngleBetweenThreePoints(p1, p2, p3) {
            const a = Math.hypot(p3[0] - p2[0], p3[1] - p2[1]);
            const b = Math.hypot(p1[0] - p2[0], p1[1] - p2[1]);
            const c = Math.hypot(p3[0] - p1[0], p3[1] - p1[1]);
            let angleRad = Math.acos((a*a + b*b - c*c) / (2 * a * b));
            if (isNaN(angleRad)) angleRad = 0;
            return Math.round(angleRad * 180 / Math.PI);
        }

        function updateViewBox() {
            svg.setAttribute('viewBox', `${svgViewBox.x} ${svgViewBox.y} ${svgViewBox.w} ${svgViewBox.h}`);
        }

        function renderEngine() {
            const shapesGroup = document.getElementById('shapes-group');
            const verticesGroup = document.getElementById('vertices-group');
            const anglesGroup = document.getElementById('angles-group');
            
            shapesGroup.innerHTML = '';
            verticesGroup.innerHTML = '';
            anglesGroup.innerHTML = '';
            
            const points = currentGeometry.points;

            currentGeometry.shapes.forEach(shape => {
                const pathCoords = shape.vertices.map(vName => {
                    if(!points[vName]) return '0,0'; // Fault tolerance si borran punto del JSON pero no del array Shape
                    return points[vName].join(',');
                }).join(' ');
                
                shapesGroup.innerHTML += `<polygon points="${pathCoords}" class="shape-path" />`;
                
                if (settings.showLabels) {
                    for(let i = 0; i < shape.vertices.length; i++) {
                        const prevObj = points[shape.vertices[(i === 0) ? shape.vertices.length - 1 : i - 1]];
                        const currObj = points[shape.vertices[i]];
                        const nextObj = points[shape.vertices[(i + 1) % shape.vertices.length]];
                        
                        if(prevObj && currObj && nextObj) {
                            const angle = getAngleBetweenThreePoints(prevObj, currObj, nextObj);
                            anglesGroup.innerHTML += `<text x="${currObj[0]}" y="${currObj[1] + 25}" class="angle-text" text-anchor="middle">${angle}°</text>`;
                        }
                    }
                }
            });

            const vertexRadius = svgViewBox.w / 200; 
            const fs = svgViewBox.w / 150; 
            
            Object.keys(points).forEach(pName => {
                const [x, y] = points[pName];
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', x);
                circle.setAttribute('cy', y);
                circle.setAttribute('r', draggingVertex === pName ? vertexRadius*2.5 : vertexRadius);
                circle.setAttribute('class', `vertex ${draggingVertex === pName ? 'dragging' : ''}`);
                circle.setAttribute('data-name', pName);
                
                if (settings.showLabels) {
                    verticesGroup.innerHTML += `
                        <text x="${x + vertexRadius*2}" y="${y - vertexRadius}" class="vertex-label" style="font-size:${fs}px">${pName}</text>
                        <text x="${x + vertexRadius*2}" y="${y + vertexRadius*2}" class="coord-label" style="font-size:${fs*0.8}px">[${Math.round(x)}, ${Math.round(y)}]</text>`;
                }
                verticesGroup.appendChild(circle);
            });

            if(document.activeElement !== editor) {
                editor.value = JSON.stringify(currentGeometry, null, 4);
            }
        }

        editor.addEventListener('blur', () => {
            try { currentGeometry = JSON.parse(editor.value); pushHistory(); renderEngine(); } catch(e) {}
        });

        // --- SISTEMA DE DRAG, ADD, REMOVE, PAN, ZOOM ---
        let draggingVertex = null;
        let isPanning = false;
        let startPan = { x: 0, y: 0 };
        let startViewBox = { ...svgViewBox };

        function getMousePositionSVG(evt) {
            const CTM = svg.getScreenCTM();
            return { x: (evt.clientX - CTM.e) / CTM.a, y: (evt.clientY - CTM.f) / CTM.d };
        }

        // REMOVE VERTEX OR ADD VERTEX (DBLCLICK)
        svg.addEventListener('dblclick', (e) => {
            if (e.target.classList.contains('vertex')) {
                // DELETE
                const pName = e.target.getAttribute('data-name');
                delete currentGeometry.points[pName];
                currentGeometry.shapes.forEach(shape => {
                    shape.vertices = shape.vertices.filter(v => v !== pName);
                });
                hudInfo.innerHTML = `<span style="color:#ff0055">Punto ELIMINADO: ${pName}</span>`;
                pushHistory();
                renderEngine();
            } else {
                // ADD
                const pos = getMousePositionSVG(e);
                let n = 1;
                while(currentGeometry.points[`P_Nuevo_${n}`]) n++;
                const newName = `P_Nuevo_${n}`;
                currentGeometry.points[newName] = [Math.round(pos.x), Math.round(pos.y)];
                
                // Añadirlo automáticamente a la primera shape para que se vea
                if(currentGeometry.shapes.length > 0) {
                    currentGeometry.shapes[0].vertices.push(newName);
                }
                
                hudInfo.innerHTML = `<span style="color:#00ffcc">Punto CREADO: ${newName}</span>`;
                pushHistory();
                renderEngine();
            }
        });

        svg.addEventListener('mousedown', (e) => {
            if (e.button === 1 || e.buttons === 4 || e.shiftKey) {
                // PAN (MMB OR SHIFT+CLICK)
                isPanning = true;
                document.getElementById('blueprint-area').classList.add('panning');
                startPan = { x: e.clientX, y: e.clientY };
                startViewBox = { ...svgViewBox };
                return;
            }
            if (e.target.classList.contains('vertex')) {
                draggingVertex = e.target.getAttribute('data-name');
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isPanning) {
                const dx = (e.clientX - startPan.x) * (svgViewBox.w / svg.clientWidth);
                const dy = (e.clientY - startPan.y) * (svgViewBox.h / svg.clientHeight);
                svgViewBox.x = startViewBox.x - dx;
                svgViewBox.y = startViewBox.y - dy;
                updateViewBox();
                return;
            }
            if (draggingVertex) {
                const pos = getMousePositionSVG(e);
                let newX = pos.x;
                let newY = pos.y;

                if (settings.snapToGrid) {
                    newX = Math.round(newX / settings.gridSize) * settings.gridSize;
                    newY = Math.round(newY / settings.gridSize) * settings.gridSize;
                } else {
                    newX = Math.round(newX);
                    newY = Math.round(newY);
                }

                let snapped = false;
                const snapDis = svgViewBox.w / 60; 
                Object.keys(currentGeometry.points).forEach(pName => {
                    if (pName !== draggingVertex) {
                        const px = currentGeometry.points[pName][0];
                        const py = currentGeometry.points[pName][1];
                        if (Math.hypot(newX - px, newY - py) < snapDis) {
                            newX = px; newY = py; snapped = true;
                        }
                    }
                });

                currentGeometry.points[draggingVertex] = [newX, newY];
                hudInfo.innerHTML = snapped ? `<span style="color:#00ffcc">💥 SNAP MAGNÉTICO: [${newX}, ${newY}]</span>` : `[X: ${newX}, Y: ${newY}]`;
                renderEngine();
            }
        });

        window.addEventListener('mouseup', () => {
            if (draggingVertex) {
                draggingVertex = null;
                hudInfo.innerHTML = "Estado Salvado. Ctrl+Z disponible.";
                pushHistory();
                renderEngine(); 
            }
            if (isPanning) {
                isPanning = false;
                document.getElementById('blueprint-area').classList.remove('panning');
            }
        });

        svg.addEventListener('wheel', (e) => {
            e.preventDefault();
            const pos = getMousePositionSVG(e);
            const zoomFactor = e.deltaY > 0 ? 1.15 : 0.85;
            svgViewBox.x = pos.x - (pos.x - svgViewBox.x) * zoomFactor;
            svgViewBox.y = pos.y - (pos.y - svgViewBox.y) * zoomFactor;
            svgViewBox.w *= zoomFactor;
            svgViewBox.h *= zoomFactor;
            updateViewBox();
            renderEngine();
        });

        // --- TOOLBAR ---
        document.getElementById('btn-toggle-labels').addEventListener('click', (e) => {
            settings.showLabels = !settings.showLabels;
            e.target.classList.toggle('active');
            renderEngine();
        });

        document.getElementById('btn-snap-grid').addEventListener('click', (e) => {
            settings.snapToGrid = !settings.snapToGrid;
            e.target.classList.toggle('active');
        });

        document.getElementById('btn-wireframe').addEventListener('click', (e) => {
            settings.wireframe = !settings.wireframe;
            e.target.classList.toggle('active');
            if(settings.wireframe) svg.classList.add('wireframe-mode');
            else svg.classList.remove('wireframe-mode');
        });

        document.getElementById('ref-opacity').addEventListener('input', (e) => {
            document.getElementById('ref-image').setAttribute('opacity', e.target.value);
        });

        // UPLOAD REFERENCE IMAGE
        document.getElementById('upload-ref').addEventListener('change', (e) => {
            if(e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('ref-image').setAttribute('href', ev.target.result);
                }
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        document.getElementById('btn-export-svg').addEventListener('click', () => {
            let cleanSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${svgViewBox.x} ${svgViewBox.y} ${svgViewBox.w} ${svgViewBox.h}">\n`;
            currentGeometry.shapes.forEach(shape => {
                const pathCoords = shape.vertices.map(v => currentGeometry.points[v] ? currentGeometry.points[v].join(',') : '').join(' ');
                cleanSVG += `  <polygon points="${pathCoords}" fill="#0d0d0d"/>\n`;
            });
            cleanSVG += "</svg>";
            const blob = new Blob([cleanSVG], {type: "image/svg+xml"});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "vectorify-export.svg"; a.click();
        });

        document.getElementById('btn-export-json').addEventListener('click', () => {
            const blob = new Blob([JSON.stringify(currentGeometry, null, 2)], {type: "application/json"});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "vectorify-data.json"; a.click();
        });

        // INIT
        updateViewBox();
        drawGrid();
        renderEngine();
    </script>
</body>
</html>
