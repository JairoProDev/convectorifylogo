<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>10 - Premium Titanium Shimmer [V-OVERHAUL]</title>
    <style>
        body { background: #0a0b0c; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; overflow: hidden; }
        
        .device-stage { width: 400px; height: 400px; position: relative; }
        
        svg { width: 100%; height: 100%; color: #fff; fill: currentColor; stroke: currentColor; stroke-width: 8px;}
        .c-shell { fill: #1c1f24; stroke: #333; }
        .v-core { fill: #2c3138; stroke: #444; }
        .y-stem { stroke: #555; stroke-width: 24px; fill: none; }

        /* THE TITANIUM WIPE - Applied as an independent absolute layer blending atop the SVG */
        .shimmer-overlay {
            position: absolute; inset: 0; pointer-events: none; mix-blend-mode: overlay;
            background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.0) 25%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.0) 75%, transparent 80%);
            background-size: 200% 200%;
            animation: appleShine 4s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            
            /* Usamos el logo SVG mismo para enmascarar el brillo EXACTO */
            mask: url(#logo-clip-mask);
            -webkit-mask: url(#logo-clip-mask);
        }

        @keyframes appleShine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
    <div class="device-stage">
        <svg viewBox="-510 -510 1020 1020">
            <defs>
                <mask id="logo-clip-mask">
                    <g stroke-linejoin="round" stroke-linecap="round" fill="white" stroke="white">
                        <polygon points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" stroke-width="8"/>
                        <polygon points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" stroke-width="8"/>
                        <g stroke-width="24" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g>
                    </g>
                </mask>
            </defs>
            <g stroke-linejoin="round" stroke-linecap="round">
                <polygon class="c-shell" points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" />
                <polygon class="v-core"  points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" />
                <g class="y-stem" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g>
            </g>
        </svg>
        <div class="shimmer-overlay"></div>
    </div>
</body>
</html>
