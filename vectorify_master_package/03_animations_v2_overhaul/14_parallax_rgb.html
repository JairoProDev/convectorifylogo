<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>14 - Chromatic Aberration Glitch [V-OVERHAUL]</title>
    <style>
        body { background: #030508; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; overflow: hidden; }
        .glitch-wrapper { position: relative; width: 350px; height: 350px; }
        
        svg { width: 100%; height: 100%; position: absolute; fill: transparent; stroke-width: 8px; stroke-linejoin: round; stroke-linecap: round;}
        
        /* The RGB splitting glitch */
        .g-red { stroke: #ff0000; animation: glitchRed 2s infinite steps(2); mix-blend-mode: screen; opacity: 0.8; z-index: 3;}
        .g-green { stroke: #00ff00; animation: glitchGreen 2.5s infinite steps(3); mix-blend-mode: screen; opacity: 0.8; z-index: 2;}
        .g-blue { stroke: #0000ff; animation: glitchBlue 3s infinite steps(2); mix-blend-mode: screen; opacity: 0.8; z-index: 1;}
        .g-white { stroke: #fff; fill: #111; z-index: 4; }

        .y-stem { stroke-width: 8px !important; }

        @keyframes glitchRed { 0%, 90% { transform: translate(0,0); } 92% { transform: translate(-10px, -5px); } 94% { transform: translate(15px, 0); } 96%, 100% { transform: translate(0,0); } }
        @keyframes glitchGreen { 0%, 80% { transform: translate(0,0); } 82% { transform: translate(5px, 10px) skewX(5deg); } 84% { transform: translate(-5px, -10px); } 86%, 100% { transform: translate(0,0); } }
        @keyframes glitchBlue { 0%, 85% { transform: translate(0,0); } 87% { transform: translate(10px, -5px); } 89% { transform: translate(-15px, 15px) scale(1.05); } 91%, 100% { transform: translate(0,0); } }
    </style>
</head>
<body>
    <div class="glitch-wrapper">
        <!-- RGB Split Cloning -->
        <svg viewBox="-510 -510 1020 1020" class="g-red"><g><polygon points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195"/><polygon points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130"/><g class="y-stem" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g></g></svg>
        <svg viewBox="-510 -510 1020 1020" class="g-green"><g><polygon points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195"/><polygon points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130"/><g class="y-stem" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g></g></svg>
        <svg viewBox="-510 -510 1020 1020" class="g-blue"><g><polygon points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195"/><polygon points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130"/><g class="y-stem" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g></g></svg>
        <svg viewBox="-510 -510 1020 1020" class="g-white"><g><polygon points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195"/><polygon points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130"/><g class="y-stem" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g></g></svg>
    </div>
</body>
</html>
