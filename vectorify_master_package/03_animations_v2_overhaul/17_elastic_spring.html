<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>17 - Impact Elastic Squash [V-OVERHAUL]</title>
    <style>
        body { background: #030508; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; overflow: hidden; }
        svg { width: 350px; height: 350px; color: #fff; fill: currentColor; stroke: currentColor; overflow: visible;}
        
        /* The external SVG drops and bounces globally */
        svg { animation: masterBounce 2s infinite cubic-bezier(0.28, 0.84, 0.42, 1); transform-origin: bottom center;}
        
        .c-shell { stroke-width: 8px; fill: #111; stroke: #333; }
        /* Components distort inside their shell on impact */
        .v-core { fill: #00ffcc; transform-origin: bottom center; animation: jelloDeform 2s infinite; stroke: none;}
        .y-stem { fill: none; stroke-width: 24px; stroke: #111; transform-origin: bottom center; animation: jelloDeform 2s infinite reverse;}

        @keyframes masterBounce { 
            0% { transform: translateY(-400px) scale(0.9, 1.2); } 
            20% { transform: translateY(0px) scale(1.3, 0.6); } 
            40% { transform: translateY(-100px) scale(0.95, 1.05); } 
            60% { transform: translateY(0px) scale(1.05, 0.95); } 
            80%, 100% { transform: translateY(0px) scale(1, 1); filter: drop-shadow(0 20px 10px rgba(0,255,204,0.3));} 
        }
        
        @keyframes jelloDeform {
            0%, 18% { transform: scale(1); }
            20% { transform: scale(1.5, 0.5) translateY(50px); }
            40% { transform: scale(0.8, 1.2) translateY(-20px); }
            60%, 100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <svg viewBox="-510 -510 1020 1020">
        <g stroke-linejoin="round" stroke-linecap="round">
            <polygon class="c-shell" points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" />
            <polygon class="v-core"  points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" />
            <g class="y-stem" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g>
        </g>
    </svg>
</body>
</html>
