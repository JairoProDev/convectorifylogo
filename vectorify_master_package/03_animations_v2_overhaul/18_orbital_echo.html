<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>18 - Hyperspace Echo Drive [V-OVERHAUL]</title>
    <style>
        body { background: #030508; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; overflow: hidden; }
        .wrapper { position: relative; width: 350px; height: 350px; }
        
        .echo-ring { 
            position: absolute; top:0; left:0; width: 100%; height: 100%; fill: transparent; stroke-width: 4px; 
            animation: hyperExpand 3s infinite cubic-bezier(0.165, 0.84, 0.44, 1); z-index: -1; transform-origin: center;
        }
        
        .c-shell { stroke: rgba(0,255,204,0.8); }
        .v-core { stroke: rgba(255,0,85,0.8); stroke-width: 8px;}
        .y-stem { stroke-width: 8px !important; stroke: #fff;}
        
        /* Create intense offset echoes */
        .e1 { animation-delay: 0s; } .e2 { animation-delay: 0.6s; } .e3 { animation-delay: 1.2s; } .e4 { animation-delay: 1.8s; }

        .center-logo { position: absolute; width:100%; height: 100%; filter: drop-shadow(0 0 20px rgba(0,255,204,1));}
        .center-logo .c-shell { stroke-width: 8px; stroke: #00ffcc; fill: #111;}
        .center-logo .v-core { fill: #00ffcc; stroke: none; }
        .center-logo .y-stem { stroke-width: 24px !important; stroke: #111; }

        @keyframes hyperExpand { 
            0% { transform: scale(0.5) translateZ(-100px); opacity: 1; filter: blur(0px); stroke-width: 20px;} 
            100% { transform: scale(5) translateZ(100px); opacity: 0; filter: blur(10px); stroke-width: 1px;} 
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- Generando pulsos de sonar masivos que emanan de la geometria en capas multiples -->
        <svg class="echo-ring e1" viewBox="-510 -510 1020 1020">
            <g stroke-linejoin="round" stroke-linecap="round"><polygon class="c-shell" points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" /><polygon class="v-core" points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" /><g class="y-stem" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g></g>
        </svg>
        <svg class="echo-ring e2" viewBox="-510 -510 1020 1020"><g stroke-linejoin="round" stroke-linecap="round"><polygon class="c-shell" points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" /><polygon class="v-core" points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" /><g class="y-stem" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g></g></svg>
        <svg class="echo-ring e3" viewBox="-510 -510 1020 1020"><g stroke-linejoin="round" stroke-linecap="round"><polygon class="c-shell" points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" /><polygon class="v-core" points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" /><g class="y-stem" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g></g></svg>
        <svg class="echo-ring e4" viewBox="-510 -510 1020 1020"><g stroke-linejoin="round" stroke-linecap="round"><polygon class="c-shell" points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" /><polygon class="v-core" points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" /><g class="y-stem" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g></g></svg>

        <svg class="center-logo" viewBox="-510 -510 1020 1020">
            <g stroke-linejoin="round" stroke-linecap="round">
                <polygon class="c-shell" points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" />
                <polygon class="v-core"  points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" />
                <g class="y-stem" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g>
            </g>
        </svg>
    </div>
</body>
</html>
