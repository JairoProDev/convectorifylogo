<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>08 - Interactive Magnetic Target [V-OVERHAUL]</title>
    <style>
        body { background: #030508; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; overflow: hidden; perspective: 1000px; }
        
        .container { position: relative; width: 350px; height: 350px; transform-style: preserve-3d; }
        
        /* MULTI-LEVEL PARALLAX BASED ON JS */
        .c-shell { fill: #111; stroke: #333; stroke-width: 8px; transition: 0.1s; }
        .v-core { fill: none; stroke: #0088ff; stroke-width: 8px; transition: 0.1s; }
        .y-stem { stroke: #00ffcc; stroke-width: 24px; fill: none; transition: 0.1s; stroke-linecap: round;}
        
        svg { width: 100%; height: 100%; overflow: visible;}
    </style>
</head>
<body>
    <div class="container" id="tracker">
        <svg viewBox="-510 -510 1020 1020">
            <g stroke-linejoin="round" stroke-linecap="round">
                <polygon class="c-shell" id="layer-back" points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" />
                <polygon class="v-core" id="layer-mid" points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" />
                <g class="y-stem" id="layer-front"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g>
            </g>
        </svg>
    </div>
    <script>
        // Mathematical depth layering tracking
        const cont = document.getElementById('tracker');
        const lBack = document.getElementById('layer-back');
        const lMid = document.getElementById('layer-mid');
        const lFront = document.getElementById('layer-front');

        document.addEventListener('mousemove', e => { 
            const rect = cont.getBoundingClientRect(); 
            const cx = rect.left + rect.width/2; 
            const cy = rect.top + rect.height/2; 
            
            // Mouse absolute position ratios (-1 to 1)
            const rx = (e.clientX - cx) / (window.innerWidth/2);
            const ry = (e.clientY - cy) / (window.innerHeight/2);

            // Container rotates dynamically
            cont.style.transform = `rotateY(${rx * 40}deg) rotateX(${-ry * 40}deg)`;
            
            // Internal nodes translate at different depth velocities
            lBack.style.transform = `translate(${rx * -20}px, ${ry * -20}px)`;
            lMid.style.transform = `translate(${rx * 30}px, ${ry * 30}px)`;
            lFront.style.transform = `translate(${rx * 80}px, ${ry * 80}px)`;
        });
    </script>
</body>
</html>
