<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>12 - Camera Focus Shockwave [V-OVERHAUL]</title>
    <style>
        body { background: #030508; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; overflow: hidden; }
        svg { width: 350px; height: 350px; color: #fff; fill: currentColor; stroke: currentColor; position: relative;}
        
        .c-shell { fill: #111; stroke: #333; stroke-width: 8px; }
        .v-core { stroke-width: 8px; fill: #00ffcc; stroke: #00ffcc; filter: blur(0px); animation: focusSnap 4s infinite cubic-bezier(1, 0, 0, 1);}
        .y-stem { stroke-width: 24px; stroke: #111; fill: none; animation: focusSnapY 4s infinite cubic-bezier(1, 0, 0, 1) reverse; }

        /* THE UPGRADE: Depth of Field physics. Foreground components blur while background snaps in, creating a macro lens tracking effect */
        @keyframes focusSnap { 
            0%, 20% { filter: blur(15px); opacity: 0.5; transform: scale(0.9); } 
            25%, 75% { filter: blur(0px); opacity: 1; transform: scale(1); filter: drop-shadow(0 0 20px #00ffcc); } 
            80%, 100% { filter: blur(15px); opacity: 0.5; transform: scale(1.1); } 
        }
        @keyframes focusSnapY { 
            0%, 20% { filter: blur(0px); opacity: 1; transform: scale(1); } 
            25%, 75% { filter: blur(10px); opacity: 0.3; transform: scale(1.5); } 
            80%, 100% { filter: blur(0px); opacity: 1; transform: scale(1); } 
        }
    </style>
</head>
<body>
    <svg viewBox="-510 -510 1020 1020">
        <g stroke-linejoin="round" stroke-linecap="round">
            <polygon class="c-shell" points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" />
            <polygon class="v-core"  points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" />
            <g class="y-stem" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g>
        </g>
    </svg>
</body>
</html>
