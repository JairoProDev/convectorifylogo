<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SVG Animation: Cinematic Focus Sweep (V1)</title>
    <style>
        body { background: #0a0c10; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        svg { width: 300px; height: 300px; color: #fff; fill: currentColor; stroke: currentColor; animation: cineFocus 4s infinite alternate ease-in-out; }
        @keyframes cineFocus { 0% { filter: blur(30px) brightness(0.2); opacity: 0; transform: scale(1.2); } 100% { filter: blur(0px) brightness(1); opacity: 1; transform: scale(1); } }
    </style>
</head>

</html>
