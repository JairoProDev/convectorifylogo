<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SVG Animation: Dash Chaser Electric (V1)</title>
    <style>
        body { background: #0a0c10; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        svg { width: 300px; height: 300px; color: #00ffcc; fill: rgba(0,255,204,0.05); stroke: currentColor; stroke-dasharray: 200 400; animation: chase 2s linear infinite; }
        @keyframes chase { to { stroke-dashoffset: -600; } }
    </style>
</head>

</html>
