<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SVG Animation: Draw Lines (V1)</title>
    <style>
        body { background: #0a0c10; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        svg { width: 300px; height: 300px; color: #00ffcc; fill: none; stroke: currentColor; stroke-dasharray: 4000; stroke-dashoffset: 4000; animation: draw 4s cubic-bezier(0.8, 0, 0.2, 1) forwards; }
        @keyframes draw { to { stroke-dashoffset: 0; fill: rgba(0, 255, 204, 0.1); } }
    </style>
</head>
<body><svg viewBox="-510 -510 1020 1020"><g stroke-linejoin="round" stroke-linecap="round"><polygon points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" stroke-width="8"/><polygon points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" stroke-width="8"/><g stroke-width="24" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g></g></svg></body>
</html>
