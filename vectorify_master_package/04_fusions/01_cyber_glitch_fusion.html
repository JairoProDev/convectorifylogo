<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SVG Fusion: Cyber Glitch Matrix</title>
    <style>
        body { background: #05070a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .fusion-container { position: relative; width: 400px; height: 400px; }
        
        svg { width: 100%; height: 100%; color: #00ffcc; fill: currentColor; stroke: currentColor; 
              /* PARALLAX FLOAT FUSION */
              animation: masterFloat 5s ease-in-out infinite alternate, neonGlow 2s infinite alternate; }
        
        /* HOVER INTERACTION TRIGGER - The 'Y' gets wireframed perfectly as explained in MD */
        svg:hover .y-stem { stroke-width: 8px !important; fill: none !important; }
        svg:hover .c-shell { fill: none; stroke: #ff0055; stroke-dasharray: 50; animation: dashChase 1s linear infinite; }
        
        @keyframes masterFloat { 
            0% { transform: translateY(-10px) rotateX(10deg); filter: drop-shadow(0 20px 30px rgba(0,255,204,0.3)); } 
            100% { transform: translateY(10px) rotateX(-5deg); filter: drop-shadow(0 40px 60px rgba(255,0,85,0.2)); } 
        }
        @keyframes neonGlow { 0% { opacity: 0.8; } 100% { opacity: 1; filter: drop-shadow(0 0 20px #00ffcc); } }
        @keyframes dashChase { to { stroke-dashoffset: 100; } }

        /* THE RANDOM GLITCH INJECTOR */
        .fusion-container::before {
            content: ''; position: absolute; inset: 0; background: url('data:image/svg+xml;utf8,<svg viewBox="-510 -510 1020 1020" xmlns="http://www.w3.org/2000/svg"><g fill="%23ff0055"><polygon points="-225,-130 0,260 225,-130"/></g></svg>') no-repeat center; background-size: cover;
            mix-blend-mode: screen; opacity: 0; animation: glitchHit 4s steps(1) infinite;
        }
        @keyframes glitchHit { 1%, 3% { opacity: 0.5; transform: translate(-10px, 10px) scale(1.05); } 2%, 4% { opacity: 0; transform: translate(0,0); } }
    </style>
</head>
<body>
    <!-- Este archivo FUSIONA: Hover Interactions, Glitch Overlay, Neon Pulsar y Float 3D -->
    <div class="fusion-container">
        <svg viewBox="-510 -510 1020 1020">
            <g stroke-linejoin="round" stroke-linecap="round">
                <polygon class="c-shell" points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" stroke-width="8"/>
                <polygon class="v-core" points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" stroke-width="8"/>
                <g class="y-stem" stroke-width="24" fill="none">
                    <line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/>
                </g>
            </g>
        </svg>
    </div>
</body>
</html>
