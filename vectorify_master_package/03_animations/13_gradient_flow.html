<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SVG Animation: Gradient Aqua Flow</title>
    <style>
        body { background: #0a0c10; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        svg { width: 300px; height: 300px; fill: url(#flowGrad); stroke: url(#flowGrad); }
    </style>
</head>
<body>
    <svg viewBox="-510 -510 1020 1020">
        <defs>
            <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00ffcc">
                    <animate attributeName="stop-color" values="#00ffcc;#0055ff;#00ffcc" dur="4s" repeatCount="indefinite" />
                </stop>
                <stop offset="100%" stop-color="#ff0055">
                    <animate attributeName="stop-color" values="#ff0055;#ffaa00;#ff0055" dur="4s" repeatCount="indefinite" />
                </stop>
            </linearGradient>
        </defs>
        <g stroke-linejoin="round" stroke-linecap="round"><polygon points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" stroke-width="8"/><polygon points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" stroke-width="8"/><g stroke-width="24" fill="none"><line x1="0" y1="0" x2="0" y2="130"/><line x1="0" y1="0" x2="-145" y2="-92"/><line x1="0" y1="0" x2="145" y2="-92"/></g></g>
    </svg>
</body>
</html>
