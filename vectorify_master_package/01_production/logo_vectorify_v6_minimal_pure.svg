<svg viewBox="-350 -400 700 800" xmlns="http://www.w3.org/2000/svg">
  <title>Vectorify Minimal Pure (No Strokes)</title>
  <!-- Menos peso en bytes absoluto. Geometría afilada perfecta. -->
  <g>
    <!-- Letra C Principal -->
    <polygon points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" fill="currentColor" />
    
    <!-- Letra V Unificada -->
    <polygon points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" fill="currentColor" />
    
    <!-- Estructura Central Y -->
    <g stroke="currentColor" stroke-width="24" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="130" />
      <line x1="0" y1="0" x2="-145" y2="-92" />
      <line x1="0" y1="0" x2="145" y2="-92" />
    </g>
  </g>
</svg>
