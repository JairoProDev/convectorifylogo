<svg viewBox="-350 -400 700 800" xmlns="http://www.w3.org/2000/svg">
  <title>Vectorify Dual Palette (Perfect Canva Handling)</title>
  <!-- Este archivo crea DOS paletas de colores en Canva. -->
  <!-- Modifica #00FFCC en Canva para cambiar C y V al mismo tiempo. (Relleno y Borde se colapsan) -->
  <g stroke-linejoin="round" stroke-linecap="round">
    <polygon 
      points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" 
      fill="#00FFCC" stroke="#00FFCC" stroke-width="8" />
    
    <polygon 
      points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" 
      fill="#00FFCC" stroke="#00FFCC" stroke-width="8" />
    
    <!-- Modifica #111111 en Canva para cambiar las flechas Y independientemente -->
    <g stroke="#111111" stroke-width="24" fill="none">
      <line x1="0" y1="0" x2="0" y2="130" />
      <line x1="0" y1="0" x2="-145" y2="-92" />
      <line x1="0" y1="0" x2="145" y2="-92" />
    </g>
  </g>
</svg>
