<svg viewBox="-350 -400 700 800" xmlns="http://www.w3.org/2000/svg">
  <title>Vectorify Master - Minimalist True Rounded</title>
  <g stroke-linejoin="round" stroke-linecap="round">
    <!-- C Shell (With 8px Corner Rounding) -->
    <polygon 
      points="0,-390 338,-195 225,-130 0,-260 -225,-130 -225,130 0,260 225,130 338,195 0,390 -338,195 -338,-195" 
      fill="#000000" stroke="#000000" stroke-width="8" />
    
    <!-- V Core (With 8px Corner Rounding) -->
    <polygon 
      points="-225,-130 0,260 225,-130 80,-130 145,-92 0,130 -145,-92 -80,-130" 
      fill="#000000" stroke="#000000" stroke-width="8" />
    
    <!-- Y Structure (24px thick lines) -->
    <g stroke="#000000" stroke-width="24" fill="none">
      <line x1="0" y1="0" x2="0" y2="130" />
      <line x1="0" y1="0" x2="-145" y2="-92" />
      <line x1="0" y1="0" x2="145" y2="-92" />
    </g>
  </g>
</svg>
